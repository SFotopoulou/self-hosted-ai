global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: vllm
    static_configs:
      - targets: ["vllm:8000"]
    metrics_path: /metrics

  - job_name: litellm
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics

  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]
